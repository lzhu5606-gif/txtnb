<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>沉浸式本地阅读器 Max</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        
        body { 
            background-color: #1A1A1A; 
            overscroll-behavior-y: none; /* 阻止 iOS 橡皮筋下拉刷新 */
            -webkit-tap-highlight-color: transparent;
        }

        /* 隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 优雅的细滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.4); border-radius: 10px; }
        
        /* 核心阅读器多列排版引擎 */
        .reader-columns {
            height: 100%;
            column-gap: 0;
            column-fill: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            word-break: break-word;
        }
        
        /* 亚克力毛玻璃滤镜 */
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* 文本两端对齐，标点挤压优化 */
        .text-justify-custom { 
            text-align: justify; 
            text-justify: inter-ideograph;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 字体预设 */
        .font-sans-system { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .font-serif-song { font-family: "Songti SC", "SimSun", serif; }
        .font-serif-kai { font-family: "Kaiti SC", "KaiTi", serif; }
        .font-sans-hei { font-family: "Heiti SC", "SimHei", sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback, memo, useMemo } = React;

        // ================= 数据库操作 (IndexedDB) =================
        const DB_NAME = 'txt_reader_pro_db';
        const STORE_NAME = 'books';

        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const dbOps = {
            async saveBook(book) {
                const db = await openDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(book);
                    tx.oncomplete = () => resolve();
                });
            },
            async getAllBooks() {
                const db = await openDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const request = tx.objectStore(STORE_NAME).getAll();
                    request.onsuccess = () => resolve(request.result || []);
                });
            },
            async deleteBook(id) {
                const db = await openDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).delete(id);
                    tx.oncomplete = () => resolve();
                });
            }
        };

        const PRESET_THEMES = {
            light: { id: 'light', name: '白天', bg: '#F8F9FA', text: '#2C2C2C', menuBg: 'rgba(255,255,255,0.85)', border: '#E5E7EB' },
            sepia: { id: 'sepia', name: '羊皮纸', bg: '#F4ECD8', text: '#4A3D30', menuBg: 'rgba(244,236,216,0.85)', border: '#E3D5BA' },
            green: { id: 'green', name: '护眼绿', bg: '#C8E6C9', text: '#1B3E26', menuBg: 'rgba(200,230,201,0.85)', border: '#A5D6A7' },
            dark:  { id: 'dark', name: '星空黑', bg: '#121212', text: '#8E8E93', menuBg: 'rgba(30,30,30,0.85)', border: '#333333' },
        };

        const FONTS = [
            { id: 'font-sans-system', name: '系统' },
            { id: 'font-serif-song', name: '宋体' },
            { id: 'font-serif-kai', name: '楷体' },
            { id: 'font-sans-hei', name: '黑体' }
        ];

        // ================= 核心组件: 独立时钟 =================
        const ReaderClock = memo(() => {
            const [time, setTime] = useState(new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }));
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })), 1000);
                return () => clearInterval(timer);
            }, []);
            return <span>{time}</span>;
        });

        // ================= 核心组件: 纯净正文渲染引擎 =================
        const ChapterContent = memo(({ chapter, settings, containerWidth, contentRef, onScroll }) => {
            return (
                <div 
                    ref={contentRef} 
                    className={`reader-columns ${settings.fontFamily}`} 
                    style={{ columnWidth: `${containerWidth}px` }}
                    onScroll={onScroll}
                >
                    <h2 className="font-bold mb-5 mt-2 leading-snug px-4 pt-2" style={{ fontSize: `${settings.fontSize * 1.3}px` }}>
                        {chapter.title}
                    </h2>
                    {chapter.content.split('\n').map((para, idx) => {
                        const trimmed = para.trim();
                        if (!trimmed) return null;
                        return (
                            <p key={idx} className="text-justify-custom px-4" 
                               style={{ fontSize: `${settings.fontSize}px`, lineHeight: settings.lineHeight, textIndent: '2em', marginBottom: '0.4em' }}>
                                {trimmed}
                            </p>
                        );
                    })}
                </div>
            );
        });

        // ================= 杀手锏组件: 虚拟滚动目录 (破除万章卡顿) =================
        const VirtualTOCList = memo(({ chapters, currentIndex, onSelect }) => {
            const containerRef = useRef(null);
            const [scrollTop, setScrollTop] = useState(0);
            const [containerHeight, setContainerHeight] = useState(500);
            const itemHeight = 48; // 每个目录项的固定高度

            useEffect(() => {
                if (containerRef.current) setContainerHeight(containerRef.current.clientHeight);
                // 初次打开时滚动到当前阅读位置
                if (containerRef.current && currentIndex > 0) {
                    containerRef.current.scrollTop = currentIndex * itemHeight - containerHeight / 2;
                }
            }, [currentIndex]);

            // 计算当前需要渲染的索引范围 (上下多渲染5项防止白屏)
            const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - 5);
            const endIndex = Math.min(chapters.length - 1, startIndex + Math.ceil(containerHeight / itemHeight) + 10);
            const visibleChapters = chapters.slice(startIndex, endIndex + 1);

            return (
                <div ref={containerRef} className="flex-1 overflow-y-auto custom-scrollbar" onScroll={e => setScrollTop(e.target.scrollTop)}>
                    <div style={{ height: chapters.length * itemHeight, position: 'relative' }}>
                        {visibleChapters.map((chap, idx) => {
                            const absoluteIndex = startIndex + idx;
                            const isActive = absoluteIndex === currentIndex;
                            return (
                                <button
                                    key={absoluteIndex}
                                    onClick={() => onSelect(absoluteIndex)}
                                    style={{ position: 'absolute', top: absoluteIndex * itemHeight, height: itemHeight, width: '100%' }}
                                    className={`text-left px-5 flex items-center transition-all ${isActive ? 'text-blue-500 bg-blue-500/10 font-medium' : 'hover:bg-gray-500/5 opacity-80'}`}
                                >
                                    <span className="truncate block text-[14px] w-full">{chap.title}</span>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        });

        // ================= 核心 App 组件 =================
        function App() {
            const [view, setView] = useState('bookshelf');
            const [books, setBooks] = useState([]);
            const [currentBook, setCurrentBook] = useState(null);
            const [currentChapterIndex, setCurrentChapterIndex] = useState(0);
            const [isLoading, setIsLoading] = useState(false);
            const [loadingText, setLoadingText] = useState('');
            
            const [containerWidth, setContainerWidth] = useState(window.innerWidth);
            const [showMenu, setShowMenu] = useState(false);
            const [showTOC, setShowTOC] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isFullscreen, setIsFullscreen] = useState(false);
            
            // 细粒度页码状态 (本章第几页 / 共几页)
            const [pageInfo, setPageInfo] = useState({ current: 1, total: 1 });
            
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('reader_max_settings');
                return saved ? JSON.parse(saved) : { 
                    fontSize: 18, 
                    themeId: 'sepia', 
                    fontFamily: 'font-sans-system',
                    lineHeight: 1.5,
                    customBg: '#ffffff', 
                    customText: '#000000', 
                    isCustomTheme: false 
                };
            });

            const contentRef = useRef(null);
            const touchStartX = useRef(null);
            const touchStartY = useRef(null);

            useEffect(() => {
                loadBooks();
                const updateWidth = () => {
                    setContainerWidth(window.innerWidth);
                    setTimeout(calculatePages, 100); // 宽度改变后重新计算页码
                };
                window.addEventListener('resize', updateWidth);
                document.addEventListener('fullscreenchange', () => setIsFullscreen(!!document.fullscreenElement));
                return () => {
                    window.removeEventListener('resize', updateWidth);
                    document.removeEventListener('fullscreenchange', () => {});
                };
            }, []);

            useEffect(() => { localStorage.setItem('reader_max_settings', JSON.stringify(settings)); }, [settings]);

            // 核心功能：章节切换时的处理 & 进度防抖保存
            useEffect(() => {
                if (view === 'reader' && contentRef.current && currentBook) {
                    contentRef.current.scrollTo({ left: 0, behavior: 'instant' });
                    calculatePages();
                    
                    const timeoutId = setTimeout(() => {
                        const updatedBook = { ...currentBook, progress: currentChapterIndex, timestamp: Date.now() };
                        dbOps.saveBook(updatedBook);
                        setBooks(prev => prev.map(b => b.id === currentBook.id ? updatedBook : b));
                        setCurrentBook(updatedBook);
                    }, 500);
                    return () => clearTimeout(timeoutId);
                }
            }, [currentChapterIndex, view, settings.fontSize, settings.lineHeight, settings.fontFamily]); // 设置改变也会触发重新计算

            // 精准计算当前章节的页数和当前所在页
            const calculatePages = useCallback(() => {
                if (!contentRef.current) return;
                const container = contentRef.current;
                const totalPages = Math.ceil(container.scrollWidth / container.clientWidth) || 1;
                const currentPage = Math.round(container.scrollLeft / container.clientWidth) + 1 || 1;
                setPageInfo({ current: currentPage, total: totalPages });
            }, []);

            const handleContentScroll = useCallback(() => {
                calculatePages();
            }, [calculatePages]);

            const loadBooks = async () => {
                try {
                    const allBooks = await dbOps.getAllBooks();
                    allBooks.sort((a, b) => b.timestamp - a.timestamp);
                    setBooks(allBooks);
                } catch(e) { console.error("本地存储访问失败", e); }
            };

            const toggleFullScreen = async () => {
                try {
                    if (!document.fullscreenElement) {
                        await document.documentElement.requestFullscreen();
                    } else {
                        await document.exitFullscreen();
                    }
                } catch (err) { console.warn("全屏模式受限", err); }
            };

            // Web Worker 极致性能解析
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsLoading(true);
                setLoadingText('正在读取本地文件...');
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    setLoadingText('正在启动超算引擎分析章节...');
                    const buffer = event.target.result;
                    
                    const workerCode = `
                        self.onmessage = function(e) {
                            try {
                                const buffer = e.data.buffer;
                                const uint8Array = new Uint8Array(buffer);
                                let text = new TextDecoder('utf-8').decode(uint8Array);
                                if ((text.match(/\\ufffd/g) || []).length > 10) {
                                    text = new TextDecoder('gb18030').decode(uint8Array); // 兼容ANSI编码
                                }
                                
                                // 更强大的正则，兼容 "第一章", "第1章", "第001回", "Chapter 1", "第一部分" 等
                                const regex = /^\\s*(第[0-9零一二两三四五六七八九十百千万]+[章回节卷集幕计部分].*|Chapter\\s*[0-9]+.*)/gm;
                                let chapters = [];
                                const matches = [...text.matchAll(regex)];

                                if (matches.length === 0) {
                                    // 无目录小说，按字数智能切片 (每8000字一章)
                                    const chunkSize = 8000;
                                    for (let i = 0; i < text.length; i += chunkSize) {
                                        chapters.push({ title: '第 ' + (chapters.length + 1) + ' 页', content: text.slice(i, i + chunkSize) });
                                    }
                                } else {
                                    for (let i = 0; i < matches.length; i++) {
                                        const currentMatch = matches[i];
                                        const nextMatch = matches[i + 1];
                                        
                                        if (i === 0 && currentMatch.index > 50) {
                                            const prologue = text.slice(0, currentMatch.index).trim();
                                            if (prologue) chapters.push({ title: '前言 / 楔子', content: prologue });
                                        }
                                        
                                        const title = currentMatch[0].trim();
                                        const contentStart = currentMatch.index + currentMatch[0].length;
                                        const contentEnd = nextMatch ? nextMatch.index : text.length;
                                        const content = text.slice(contentStart, contentEnd).trim();
                                        
                                        // 过滤掉全是空白的假章节
                                        if(content.length > 0) {
                                            chapters.push({ title: title, content: content });
                                        }
                                    }
                                }
                                self.postMessage({ success: true, chapters: chapters });
                            } catch(err) {
                                self.postMessage({ success: false, error: err.message });
                            }
                        };
                    `;
                    
                    const blob = new Blob([workerCode], { type: 'application/javascript' });
                    const worker = new Worker(URL.createObjectURL(blob));
                    
                    worker.onmessage = async (workerEvent) => {
                        if (workerEvent.data.success) {
                            setLoadingText('正在构建个人书库...');
                            const title = file.name.replace(/\.txt$/i, '');
                            const newBook = { 
                                id: Date.now().toString(), 
                                title: title, 
                                // 随机生成更高级的莫兰迪色系封面
                                coverColor: ['bg-[#4A5568]', 'bg-[#2D3748]', 'bg-[#2C5282]', 'bg-[#276749]', 'bg-[#744210]', 'bg-[#553C9A]', 'bg-[#9B2C2C]'][Math.floor(Math.random() * 7)], 
                                chapters: workerEvent.data.chapters, 
                                progress: 0, 
                                timestamp: Date.now() 
                            };
                            await dbOps.saveBook(newBook);
                            await loadBooks();
                        } else {
                            alert("抱歉，文件解析失败: " + workerEvent.data.error);
                        }
                        setIsLoading(false);
                        worker.terminate();
                    };
                    
                    worker.postMessage({ buffer: buffer }, [buffer]); 
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null; 
            };

            const openBook = (book) => {
                const updatedBook = { ...book, timestamp: Date.now() };
                dbOps.saveBook(updatedBook);
                setCurrentBook(updatedBook);
                setCurrentChapterIndex(book.progress || 0);
                setView('reader');
                setShowMenu(false); setShowTOC(false); setShowSettings(false);
            };

            const handleDeleteBook = async (e, id) => {
                e.stopPropagation();
                if (window.confirm("确定要将这本书移出书架吗？")) {
                    await dbOps.deleteBook(id);
                    await loadBooks();
                }
            };

            // ================= 手势翻页控制 =================
            const handleTouchStart = (e) => { 
                touchStartX.current = e.touches[0].clientX; 
                touchStartY.current = e.touches[0].clientY; 
            };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null) return;
                const diffX = touchStartX.current - e.changedTouches[0].clientX;
                const diffY = touchStartY.current - e.changedTouches[0].clientY;
                
                // 防误触：如果垂直滑动距离超过水平距离，认为是系统自带滚动或误触，不翻页
                if (Math.abs(diffX) > 40 && Math.abs(diffX) > Math.abs(diffY)) { 
                    diffX > 0 ? turnPage(1) : turnPage(-1); 
                }
                touchStartX.current = null;
                touchStartY.current = null;
            };

            const handleScreenTap = (e) => {
                if (showMenu || showTOC) { setShowMenu(false); setShowTOC(false); setShowSettings(false); return; }
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const width = rect.width;
                // 热区分配：左侧 30% 上一页，中间 40% 菜单，右侧 30% 下一页
                if (x < width * 0.3) turnPage(-1);
                else if (x > width * 0.7) turnPage(1);
                else setShowMenu(true);
            };

            // 完美的精准翻页逻辑
            const turnPage = useCallback((direction) => {
                if (!contentRef.current || !currentBook) return;
                const container = contentRef.current;
                const pageWidth = container.clientWidth; 
                const currentScroll = container.scrollLeft;
                const maxScroll = container.scrollWidth - pageWidth;

                if (direction === 1) { // 下一页
                    if (currentScroll >= maxScroll - 10) { // 容错 10px
                        if (currentChapterIndex < currentBook.chapters.length - 1) setCurrentChapterIndex(curr => curr + 1);
                    } else { 
                        // 精准滚动对齐，防止半截字
                        const targetLeft = Math.round((currentScroll + pageWidth) / pageWidth) * pageWidth;
                        container.scrollTo({ left: targetLeft, behavior: 'smooth' }); 
                    }
                } else { // 上一页
                    if (currentScroll <= 10) {
                        if (currentChapterIndex > 0) {
                            setCurrentChapterIndex(curr => curr - 1);
                            // 延时等待 DOM 渲染后，瞬间定位到上一章末尾
                            setTimeout(() => {
                                if (contentRef.current) {
                                   const newMaxScroll = contentRef.current.scrollWidth - contentRef.current.clientWidth;
                                   contentRef.current.scrollTo({ left: newMaxScroll, behavior: 'instant' });
                                }
                            }, 50);
                        }
                    } else { 
                        const targetLeft = Math.round((currentScroll - pageWidth) / pageWidth) * pageWidth;
                        container.scrollTo({ left: targetLeft, behavior: 'smooth' }); 
                    }
                }
            }, [currentChapterIndex, currentBook]);

            const activeTheme = settings.isCustomTheme 
                ? { bg: settings.customBg, text: settings.customText, menuBg: settings.customBg + 'EE', border: settings.customText + '33' }
                : (PRESET_THEMES[settings.themeId] || PRESET_THEMES.light);

            // 动态同步浏览器状态栏和安全区颜色，消灭顶部大黑边
            useEffect(() => {
                document.body.style.backgroundColor = activeTheme.bg;
                let themeMeta = document.querySelector('meta[name="theme-color"]');
                if (!themeMeta) {
                    themeMeta = document.createElement('meta');
                    themeMeta.name = "theme-color";
                    document.head.appendChild(themeMeta);
                }
                themeMeta.content = activeTheme.bg;
            }, [activeTheme.bg]);

            return (
                <div className="fixed inset-0 overflow-hidden select-none flex flex-col transition-colors duration-500" 
                     style={{ backgroundColor: view === 'reader' ? activeTheme.bg : '#F3F4F6', color: view === 'reader' ? activeTheme.text : '#1F2937' }}>
                    
                    {/* ================= 书架视图 ================= */}
                    {view === 'bookshelf' && (
                        <div className="h-full bg-gray-50 p-6 overflow-y-auto hide-scrollbar relative z-0" style={{ paddingTop: 'max(1.5rem, var(--safe-top))' }}>
                            
                            {/* 优雅的加载蒙版 */}
                            {isLoading && (
                                <div className="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center backdrop-blur-sm transition-all duration-300">
                                    <div className="bg-white/90 glass-panel p-8 rounded-[2rem] shadow-2xl flex flex-col items-center space-y-6 transform scale-100">
                                        <div className="relative w-14 h-14">
                                            <div className="absolute inset-0 border-4 border-blue-200 rounded-full"></div>
                                            <div className="absolute inset-0 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                        </div>
                                        <p className="text-gray-800 font-medium text-[15px]">{loadingText}</p>
                                    </div>
                                </div>
                            )}

                            <div className="max-w-4xl mx-auto pb-24">
                                <div className="flex justify-between items-center mb-10 mt-2 px-2">
                                    <h1 className="text-[28px] font-extrabold text-gray-900 tracking-tight">私人书架</h1>
                                    <label className="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-5 py-2.5 rounded-2xl cursor-pointer transition-all shadow-lg hover:shadow-xl active:scale-95">
                                        <i className="fas fa-plus text-sm"></i>
                                        <span className="font-semibold text-[15px]">导入书籍</span>
                                        <input type="file" accept=".txt" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                </div>

                                {books.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center mt-40 text-gray-400 space-y-6">
                                        <div className="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center">
                                            <i className="fas fa-book-open text-4xl text-gray-400 opacity-60"></i>
                                        </div>
                                        <p className="text-[15px] font-medium tracking-wide">空空如也，点击右上角导入小说</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-x-4 gap-y-8 px-2">
                                        {books.map((book) => {
                                            const progressPercent = Math.round((book.progress / (book.chapters.length || 1)) * 100) || 0;
                                            return (
                                                <div key={book.id} className="flex flex-col space-y-2.5 group cursor-pointer" onClick={() => openBook(book)}>
                                                    <div className={`aspect-[3/4] ${book.coverColor} rounded-xl shadow-md group-hover:shadow-xl relative overflow-hidden flex flex-col p-3 active:scale-95 transition-all duration-300`}>
                                                        {/* 书脊质感效果 */}
                                                        <div className="absolute left-0 top-0 bottom-0 w-[3px] bg-gradient-to-r from-white/30 to-transparent"></div>
                                                        <div className="absolute inset-0 bg-gradient-to-br from-white/10 to-black/30"></div>
                                                        
                                                        <div className="relative z-10 flex-1 flex items-center justify-center pt-2">
                                                            <span className="text-white font-bold text-[15px] text-center leading-snug line-clamp-3 drop-shadow-md px-1">{book.title}</span>
                                                        </div>
                                                        
                                                        <button onClick={(e) => handleDeleteBook(e, book.id)} className="absolute top-2 right-2 p-1.5 bg-black/40 hover:bg-red-500 text-white rounded-full z-20 active:scale-75 transition-all opacity-0 group-hover:opacity-100 md:opacity-100">
                                                            <i className="fas fa-times text-[10px] w-3 h-3 flex items-center justify-center"></i>
                                                        </button>
                                                    </div>
                                                    <div className="px-1">
                                                        <h3 className="text-[13px] font-medium text-gray-800 truncate leading-tight">{book.title}</h3>
                                                        <div className="flex items-center space-x-2 mt-1.5">
                                                            <div className="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden">
                                                                <div className="h-full bg-blue-500 rounded-full" style={{ width: `${progressPercent}%` }}></div>
                                                            </div>
                                                            <span className="text-[10px] text-gray-500 w-6 font-medium">{progressPercent}%</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ================= 阅读器视图 ================= */}
                    {view === 'reader' && currentBook && (
                        <div className="absolute inset-0 overflow-hidden z-0">
                            
                            {/* 沉浸式顶部章节名 */}
                            <div className="absolute top-0 left-0 right-0 px-4 z-0 truncate font-medium flex items-end" 
                                 style={{ height: 'calc(var(--safe-top) + 24px)', paddingBottom: '4px', fontSize: '11px', opacity: 0.4 }}>
                                {currentBook.chapters[currentChapterIndex]?.title}
                            </div>

                            {/* 正文手势区域 - 上下留出内边距给页眉页脚 */}
                            <div className="absolute inset-0 z-10 box-border" 
                                 style={{ paddingTop: 'calc(var(--safe-top) + 24px)', paddingBottom: 'calc(var(--safe-bottom) + 24px)' }}
                                 onClick={handleScreenTap} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                                <ChapterContent 
                                    chapter={currentBook.chapters[currentChapterIndex]} 
                                    settings={settings} 
                                    containerWidth={containerWidth}
                                    contentRef={contentRef}
                                    onScroll={handleContentScroll}
                                />
                            </div>

                            {/* 沉浸式底部状态栏 */}
                            <div className="absolute bottom-0 left-0 right-0 px-4 z-0 font-medium flex justify-between items-start" 
                                 style={{ height: 'calc(var(--safe-bottom) + 24px)', paddingTop: '4px', fontSize: '11px', opacity: 0.4 }}>
                                <ReaderClock />
                                <span>{pageInfo.current} / {pageInfo.total} 页 &nbsp;&middot;&nbsp; 进度 {Math.min(100, Math.round(((currentChapterIndex + 1) / currentBook.chapters.length) * 100))}%</span>
                            </div>

                            {/* ================= 亚克力顶部菜单 ================= */}
                            <div className={`absolute top-0 left-0 right-0 glass-panel shadow-sm transition-transform duration-300 z-50 flex items-center px-4 py-3 ${showMenu ? 'translate-y-0' : '-translate-y-full'}`} 
                                 style={{ backgroundColor: activeTheme.menuBg, color: activeTheme.text, paddingTop: 'max(0.8rem, var(--safe-top))' }}>
                                <button onClick={() => setView('bookshelf')} className="p-2 -ml-2 rounded-full opacity-80 active:opacity-100 hover:bg-black/5 transition-colors">
                                    <i className="fas fa-chevron-left text-xl"></i>
                                </button>
                                <span className="font-bold ml-2 text-[15px] truncate flex-1">{currentBook.title}</span>
                                <button onClick={toggleFullScreen} className="p-2 rounded-full opacity-80 active:opacity-100 hover:bg-black/5 transition-colors">
                                    <i className={`fas ${isFullscreen ? 'fa-compress' : 'fa-expand'} text-lg`}></i>
                                </button>
                            </div>

                            {/* ================= 亚克力底部菜单 ================= */}
                            <div className={`absolute bottom-0 left-0 right-0 glass-panel shadow-[0_-10px_40px_rgba(0,0,0,0.1)] transition-transform duration-300 z-50 ${showMenu ? 'translate-y-0' : 'translate-y-full'}`} 
                                 style={{ backgroundColor: activeTheme.menuBg, color: activeTheme.text, paddingBottom: 'var(--safe-bottom)' }}>
                                
                                {/* 控制面板区域 */}
                                {showSettings && (
                                    <div className="p-6 border-b space-y-6 text-[14px]" style={{ borderColor: activeTheme.border }}>
                                        {/* 进度飞梭 */}
                                        <div className="flex items-center space-x-4 mb-2">
                                            <button onClick={() => setCurrentChapterIndex(c => Math.max(0, c - 1))} className="opacity-70 active:scale-90"><i className="fas fa-step-backward"></i></button>
                                            <input 
                                                type="range" 
                                                min="0" 
                                                max={currentBook.chapters.length - 1} 
                                                value={currentChapterIndex} 
                                                onChange={(e) => setCurrentChapterIndex(Number(e.target.value))}
                                                className="flex-1 h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                            />
                                            <button onClick={() => setCurrentChapterIndex(c => Math.min(currentBook.chapters.length - 1, c + 1))} className="opacity-70 active:scale-90"><i className="fas fa-step-forward"></i></button>
                                        </div>

                                        {/* 字体 & 字号 */}
                                        <div className="flex items-center space-x-3">
                                            <span className="opacity-70 font-medium w-8">字体</span>
                                            <div className="flex-1 flex space-x-2 bg-black/5 p-1 rounded-xl">
                                                {FONTS.map(f => (
                                                    <button key={f.id} onClick={() => setSettings(s => ({...s, fontFamily: f.id}))} 
                                                            className={`flex-1 py-1.5 rounded-lg text-[13px] font-medium transition-all ${settings.fontFamily === f.id ? 'bg-white shadow-sm text-blue-600' : 'opacity-70'}`}>
                                                        {f.name}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="flex items-center space-x-4">
                                            <span className="opacity-70 font-medium w-8">字号</span>
                                            <button onClick={() => setSettings(s => ({...s, fontSize: Math.max(14, s.fontSize - 2)}))} className="flex-1 py-2 rounded-xl border active:bg-black/5 transition-colors text-lg" style={{ borderColor: activeTheme.border }}>A-</button>
                                            <span className="w-10 text-center font-bold text-[16px]">{settings.fontSize}</span>
                                            <button onClick={() => setSettings(s => ({...s, fontSize: Math.min(40, s.fontSize + 2)}))} className="flex-1 py-2 rounded-xl border active:bg-black/5 transition-colors text-lg" style={{ borderColor: activeTheme.border }}>A+</button>
                                        </div>
                                        
                                        <div className="flex items-center space-x-4">
                                            <span className="opacity-70 font-medium w-8">间距</span>
                                            <button onClick={() => setSettings(s => ({...s, lineHeight: 1.2}))} className={`flex-1 py-2 rounded-xl border transition-colors ${settings.lineHeight === 1.2 ? 'border-blue-500 text-blue-500' : ''}`} style={{ borderColor: settings.lineHeight === 1.2 ? '#3B82F6' : activeTheme.border }}><i className="fas fa-align-justify leading-none" style={{transform:'scaleY(0.8)'}}></i></button>
                                            <button onClick={() => setSettings(s => ({...s, lineHeight: 1.5}))} className={`flex-1 py-2 rounded-xl border transition-colors ${settings.lineHeight === 1.5 ? 'border-blue-500 text-blue-500' : ''}`} style={{ borderColor: settings.lineHeight === 1.5 ? '#3B82F6' : activeTheme.border }}><i className="fas fa-align-justify leading-none"></i></button>
                                            <button onClick={() => setSettings(s => ({...s, lineHeight: 1.8}))} className={`flex-1 py-2 rounded-xl border transition-colors ${settings.lineHeight === 1.8 ? 'border-blue-500 text-blue-500' : ''}`} style={{ borderColor: settings.lineHeight === 1.8 ? '#3B82F6' : activeTheme.border }}><i className="fas fa-align-justify leading-none" style={{transform:'scaleY(1.2)'}}></i></button>
                                        </div>

                                        {/* 主题 */}
                                        <div className="flex items-center space-x-4 pt-2">
                                            <div className="flex-1 flex justify-between space-x-3">
                                                {Object.values(PRESET_THEMES).map(theme => (
                                                    <button key={theme.id} onClick={() => setSettings(s => ({...s, themeId: theme.id, isCustomTheme: false}))} 
                                                            className="flex-1 py-3 rounded-2xl shadow-sm transition-all relative overflow-hidden" 
                                                            style={{ backgroundColor: theme.bg, color: theme.text, 
                                                                    boxShadow: (!settings.isCustomTheme && settings.themeId === theme.id) ? `0 0 0 2px #3B82F6` : `inset 0 0 0 1px ${theme.border}` }}>
                                                        <span className="text-[13px] font-medium relative z-10">{theme.name}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {/* 底部导航按钮 */}
                                <div className="flex justify-between items-center px-6 py-2">
                                    <button onClick={() => { setShowTOC(true); setShowMenu(false); }} className="p-3 flex flex-col items-center space-y-1.5 opacity-70 active:opacity-100 hover:text-blue-500 transition-colors">
                                        <i className="fas fa-list text-[20px]"></i><span className="text-[11px] font-medium">目录</span>
                                    </button>
                                    <button onClick={() => { if (currentChapterIndex > 0) setCurrentChapterIndex(curr => curr - 1); }} className={`p-3 flex flex-col items-center space-y-1.5 transition-colors ${currentChapterIndex === 0 ? 'opacity-20' : 'opacity-70 active:opacity-100 hover:text-blue-500'}`}>
                                        <i className="fas fa-arrow-left text-[20px]"></i><span className="text-[11px] font-medium">上一章</span>
                                    </button>
                                    <button onClick={() => { if (currentChapterIndex < currentBook.chapters.length - 1) setCurrentChapterIndex(curr => curr + 1); }} className={`p-3 flex flex-col items-center space-y-1.5 transition-colors ${currentChapterIndex === currentBook.chapters.length - 1 ? 'opacity-20' : 'opacity-70 active:opacity-100 hover:text-blue-500'}`}>
                                        <i className="fas fa-arrow-right text-[20px]"></i><span className="text-[11px] font-medium">下一章</span>
                                    </button>
                                    <button onClick={() => setShowSettings(!showSettings)} className={`p-3 flex flex-col items-center space-y-1.5 transition-colors ${showSettings ? 'text-blue-500 opacity-100' : 'opacity-70 active:opacity-100 hover:text-blue-500'}`}>
                                        <i className="fas fa-font text-[20px]"></i><span className="text-[11px] font-medium">排版</span>
                                    </button>
                                </div>
                            </div>

                            {/* ================= 侧边抽屉目录 ================= */}
                            <div className={`absolute inset-0 bg-black/60 z-[60] backdrop-blur-sm transition-opacity duration-300 ${showTOC ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setShowTOC(false)}>
                                <div className={`absolute top-0 bottom-0 left-0 w-[85%] max-w-[340px] shadow-2xl transition-transform duration-300 flex flex-col`} 
                                     style={{ 
                                         backgroundColor: activeTheme.menuBg, 
                                         color: activeTheme.text, 
                                         transform: showTOC ? 'translateX(0)' : 'translateX(-100%)',
                                         paddingTop: 'var(--safe-top)',
                                         paddingBottom: 'var(--safe-bottom)'
                                     }} 
                                     onClick={e => e.stopPropagation()}>
                                    
                                    <div className="p-5 border-b flex justify-between items-center" style={{ borderColor: activeTheme.border }}>
                                        <div className="flex flex-col">
                                            <h2 className="text-[17px] font-bold truncate pr-4 leading-tight">{currentBook.title}</h2>
                                            <span className="text-[11px] opacity-60 mt-1">共 {currentBook.chapters.length} 章</span>
                                        </div>
                                        <button onClick={() => setShowTOC(false)} className="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center opacity-70 active:scale-90"><i className="fas fa-times"></i></button>
                                    </div>
                                    
                                    {/* 调用破除卡顿的虚拟列表 */}
                                    <VirtualTOCList 
                                        chapters={currentBook.chapters} 
                                        currentIndex={currentChapterIndex}
                                        onSelect={(idx) => { setCurrentChapterIndex(idx); setShowTOC(false); }}
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
